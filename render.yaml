services:
  - type: web
    name: ai-assistant-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: HF_SPACE_URL
        sync: false
      - key: HF_GENERATE_PATH
        value: /generate_stream
      - key: HF_TIMEOUT_SECONDS
        value: "120"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: ALLOW_ANON_CHAT
        value: "false"
      - key: MAX_HISTORY_MESSAGES
        value: "10"
      - key: MAX_USER_MEMORIES
        value: "5"
